name: Android Build Pipeline

on:
  push:
    branches: [ dev-es ]
  pull_request:
    branches: [ dev-es ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Build debug APK
      run: |
        cd android
        ./gradlew assembleDebug --stacktrace
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: mobileglues-apk
        path: |
          android/app/build/outputs/apk/debug/*.apk
          android/app/build/outputs/bundle/debug/*.aab
        if-no-files-found: error
        
    - name: Generate build report
      if: ${{ always() }}
      run: |
        echo "Build status: ${{ job.status }}"
        cd android
        ./gradlew buildDependencies --scan || true
        echo "Build scan URL: https://gradle.com/s/$GRADLE_SCAN_ID"
      env:
        GRADLE_SCAN_ID: ${{ secrets.GRADLE_ENTERPRISE_SCAN_ID }}
