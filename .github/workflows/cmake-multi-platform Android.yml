name: Android Build

on:
  push:
    branches: [ dev-es ]
  pull_request:
    branches: [ dev-es ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 包含.gitmodules中的子模块

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure NDK
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          echo "NDK_VERSION=25.2.9519653" >> $GITHUB_ENV
          sdkmanager --install "ndk;$NDK_VERSION"

      - name: Build native library
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}/${{ env.NDK_VERSION }}
        run: |
          # 创建本地属性文件
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          
          # 执行构建
          ./gradlew assembleRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobileglues-android-build
          path: |
            build/outputs/native-debug-symbol/release/*
            build/intermediates/stripped_native_libs/release/*
            build/outputs/aar/*.aar
          retention-days: 7
