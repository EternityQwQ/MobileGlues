name: Build

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: "android-build"
      ANDROID_ABI: "arm64-v8a"
      ANDROID_PLATFORM: "android-24"
      NDK_VERSION: "25.2.9519653"  # 使用较新NDK版本

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android NDK
      uses: android-actions/setup-android-ndk@v2
      with:
        ndk-version: ${{ env.NDK_VERSION }}

    - name: Create build directory
      run: |
        mkdir -p ${{ env.BUILD_DIR }}
        cd ${{ env.BUILD_DIR }}
        echo "Build directory created"

    - name: Configure CMake
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=${{ env.ANDROID_ABI }} \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_shared \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      working-directory: ${{ env.BUILD_DIR }}
      run: cmake --build . --target mobileglues -- -j$(nproc)

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: android-libmobileglues
        path: ${{ env.BUILD_DIR }}/libmobileglues.so
        if-no-files-found: error
