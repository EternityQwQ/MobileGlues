name: Build

on:
  workflow_dispatch:  # 手动触发工作流

jobs:
  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive  # 确保获取子模块

    - name: Set up NDK
      run: |
        # 下载并配置 Android NDK r21e（长期支持版本）
        wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
        unzip -q android-ndk-r21e-linux-x86_64.zip
        echo "NDK_PATH=$PWD/android-ndk-r21e" >> $GITHUB_ENV

    - name: Install build dependencies
      run: |
        sudo apt-get -qq update
        sudo apt-get -qq install cmake ninja-build

    - name: Build libmobileglues
      run: |
        # 创建构建目录并编译
        mkdir build && cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_NATIVE_API_LEVEL=21 \
          -DANDROID_NDK=$NDK_PATH \
          -G Ninja
        ninja

    - name: Package artifacts
      run: |
        mkdir -p dist/arm64-v8a
        # 复制生成的库文件
        cp build/libmobileglues.so dist/arm64-v8a/
        # 创建带版本标记的压缩包
        timestamp=$(date +%Y%m%d_%H%M%S)
        cd dist
        zip -r mobileglues_arm64-v8a_$timestamp.zip arm64-v8a

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: android-arm64-binaries
        path: dist/mobileglues_arm64-v8a_*.zip
