name: Build Android Native Library

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive  # 获取SPIRV-Cross等子模块

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Install Android NDK
      uses: android-actions/setup-android-ndk@v2
      with:
        ndk-version: r25c  # 使用仓库指定的NDK版本

    - name: Setup CMake
      uses: actions/setup-cmake@v1
      with:
        cmake-version: '3.22.0'  # 根据项目需求选择版本

    - name: Configure CMake
      run: |
        mkdir -p ./build/android/${{ matrix.abi }}
        cd ./build/android/${{ matrix.abi }}
        
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=${{ matrix.abi }} \
          -DANDROID_PLATFORM=android-21 \
          -DANDROID_STL=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DMG_MOBILEGLUES_VERSION=1260  # 根据实际版本修改

    - name: Build
      run: |
        cd ./build/android/${{ matrix.abi }}
        cmake --build . --config Release

    - name: Archive artifacts
      uses: actions/upload-artifact@v3
      with:
        name: libmobileglues-${{ matrix.abi }}
        path: build/android/${{ matrix.abi }}/Release/*.so
