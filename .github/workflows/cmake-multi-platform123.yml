name: Build

on:
  workflow_dispatch:
    inputs:
      ndk-version:
        description: 'Select NDK version'
        default: '25c'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # 获取所有子模块

      - name: Setup Android NDK
        uses: android-actions/setup-android-ndk@v2
        with:
          ndk-version: ${{ github.event.inputs.ndk-version }}
          android-version: 33  # 设置最低API级别

      - name: Configure CMake
        run: |
          mkdir -p build/android-arm64
          cd build/android-arm64
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Library
        run: |
          cd build/android-arm64
          cmake --build . --config Release

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libmobileglues-arm64-v8a
          path: build/android-arm64/libMobileGlues.so
