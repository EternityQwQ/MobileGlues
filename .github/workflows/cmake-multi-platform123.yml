name: Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]  # 触发条件可按需调整

jobs:
  build-arm64-v8a:
    runs-on: ubuntu-latest  # 推荐使用最新版 Ubuntu 运行环境
    steps:
      # 1. 检出代码
      - name: Checkout Source Code
        uses: actions/checkout@v4  # 最新版代码检出工具

      # 2. 设置 Android SDK 和 NDK（官方推荐最新版）
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3  # 替代过时的 ndk-action
        with:
          api-level: 34  # 最低支持 Android 14 (API 34)，可按需调整
          ndk-version: '25.2.9519653'  # 官方最新稳定版 NDK
          # 以下为可选配置（如需缓存加速构建）
          # cache-packages: true  # 启用 Android SDK 包缓存
          # java-version: '11'    # 指定 Java 版本（默认 11）

      # 3. 设置 CMake（官方稳定版）
      - name: Setup CMake
        uses: actions/setup-cmake@v4.3.1  # 最新版 CMake 工具
        with:
          cmake-version: '3.28.1'  # 推荐稳定版

      # 4. 安装项目依赖（如有）
      - name: Install Dependencies
        run: |
          # 示例：使用 pip 安装 Python 依赖（如有需要）
          # python3 -m pip install --upgrade setuptools wheel
          # 或执行其他依赖安装命令

      # 5. 生成构建文件并编译
      - name: Configure and Build ARM64-v8a
        working-directory: ./build  # 指定构建目录（按需调整）
        run: |
          # 创建构建目录并生成配置
          mkdir -p ${{ github.workspace }}/build && cd ${{ github.workspace }}/build
          # 使用 Android ARM64-v8a 工具链
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_HOME }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ secrets.ANDROID_API_LEVEL || 34 }} \  # 优先使用仓库变量，否则默认 34
            -DANDROID_STL=c++_shared \  # 推荐动态链接 STL（按需调整）
            -DCMAKE_BUILD_TYPE=Release \  # 构建类型（Debug/Release）
            -DBUILD_TESTING=OFF  # 禁用测试（按需调整）
          # 执行编译
          cmake --build . --config Release --parallel 4  # 并行编译加速

      # 6. 上传构建产物（新版 Artifact 上传工具）
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4  # 替代已弃用的 v3
        with:
          name: android-arm64-v8a-release  # 产物名称（可自定义）
          path: |
            ./build/Release/*.apk  # 上传 APK 文件
            ./build/lib/arm64-v8a/*.so  # 上传 SO 库文件
          retention-days: 7  # 产物保留天数（按需调整）
