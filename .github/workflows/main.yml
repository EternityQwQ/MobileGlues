name: Android Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (Release/Debug)'
        required: true
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure CMake
        # 注意此处的 | 符号，它允许下方编写多行命令
        run: |
          cmake -S src/main/cpp -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }} \
            -DPROFILING=OFF

      - name: Build Project
        # [span_1](start_span)使用项目名 mobileglues 进行构建[span_1](end_span)
        run: cmake --build build --config Release

      - name: Collect Artifacts
        run: |
          mkdir -p dist/${{ matrix.abi }}
          find build -name "libmobileglues.so" -exec cp {} dist/${{ matrix.abi }}/ \;
          # [span_2](start_span)拷贝预编译的库文件[span_2](end_span)
          cp src/main/cpp/libraries/${{ matrix.abi }}/libspirv-cross-c-shared.so dist/${{ matrix.abi }}/ || echo "Optional lib not found"

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-${{ matrix.abi }}
          path: dist/
