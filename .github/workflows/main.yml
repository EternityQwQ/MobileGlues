name: Android Build CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型 (Release/Debug)'
        required: true
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        abi: [arm64-v8a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive # 自动处理 FastSTL 等可能的子模块

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure CMake
        run: |
          cmake -S src/main/cpp -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ github.event.inputs.build_type || 'Release' }} \
            -DPROFILING=OFF

      - name: Build Project
        run: cmake --build build --config Release --parallel 2 --verbose

      - name: Collect and Rename Artifacts
        if: success()
        run: |
          mkdir -p dist/
          # 搜索并重命名，防止上传后文件名冲突
          find build -name "libmobileglues.so" -exec cp {} dist/libmobileglues-${{ matrix.abi }}.so \;
          # 拷贝随附的动态库（如果有）
          cp src/main/cpp/libraries/${{ matrix.abi }}/libspirv-cross-c-shared.so dist/ || echo "Optional lib not found"
          
          # 生成构建摘要，直接在 GitHub 页面看大小
          echo "### Build Summary for ${{ matrix.abi }}" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

      - name: Upload Binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-Binaries-${{ matrix.abi }}
          path: dist/
