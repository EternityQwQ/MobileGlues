name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 根据项目支持的架构进行构建
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: n0rt3n/setup-ndk@v1
        with:
          # 建议使用 r23b 或更高版本以支持完整的 C++20 
          ndk-version: r25c

      - name: Configure CMake
        # [span_4](start_span)注意：必须传入 ANDROID_ABI 变量，因为 CMakeLists.txt 中依赖它寻找路径[span_4](end_span)
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROFILING=OFF

      - name: Build Library
        run: cmake --build build --config Release

      - name: Verify and Collect Artifacts
        run: |
          mkdir -p output/${{ matrix.abi }}
          # [span_5](start_span)收集项目生成的主库[span_5](end_span)
          cp build/libmobileglues.so output/${{ matrix.abi }}/
          # [span_6](start_span)收集依赖的共享库[span_6](end_span)
          cp libraries/${{ matrix.abi }}/libspirv-cross-c-shared.so output/${{ matrix.abi }}/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobileglues-binaries-${{ matrix.abi }}
          path: output/
