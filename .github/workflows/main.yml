name: Android Build CI

on:
  push:
    branches: [ "main", "DesktopGlues" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型 (Release/Debug)'
        required: true
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        abi: [arm64-v8a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure CMake
        # 将逻辑提前处理，避免在 run 块中使用括号引起 Shell 报错
        env:
          SELECTED_BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
        run: |
          cmake -S src/main/cpp -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=$SELECTED_BUILD_TYPE \
            -DBUILD_SHARED_LIBS=ON \
            -DLIB_TYPE=SHARED \
            -DPROFILING=OFF

      - name: Build Project
        # 编译所有 target，确保包含 mobileglues 和 info_getter
        run: cmake --build build --config Release --parallel $(nproc) --verbose

      - name: Collect and Rename Artifacts
        if: success()
        run: |
          mkdir -p dist/
          # 1. 自动搜索并搜集所有生成的 .so 文件（包含 info_getter）
          find build -name "*.so" -exec cp {} dist/ \;
          
          # 2. 创建 libmobileglues-arm64-v8a.so 副本
          if [ -f "dist/libmobileglues.so" ]; then
            cp dist/libmobileglues.so dist/libmobileglues-${{ matrix.abi }}.so
          fi
          
          # 3. 提取预编译库 libspirv-cross-c-shared.so
          PREBUILT_DIR="src/main/cpp/libraries/${{ matrix.abi }}"
          if [ -d "$PREBUILT_DIR" ]; then
            cp $PREBUILT_DIR/*.so dist/ 2>/dev/null || echo "No prebuilt libs"
          fi
          
          echo "### Build Summary for ${{ matrix.abi }}" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

      - name: Upload Binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-All-Libraries-${{ matrix.abi }}
          path: dist/

      - name: Clean Build Directory
        if: always()
        run: rm -rf build
