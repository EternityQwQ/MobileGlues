name: Android Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # 对应你项目 src/main/cpp/libraries/${ANDROID_ABI}/ 目录下的架构
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          [span_1](start_span)[span_2](start_span)lfs: true # 必须开启，以拉取静态库文件[span_1](end_span)[span_2](end_span)

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure CMake
        # [span_3](start_span)修复点：-S 指向 src/main/cpp，即主 CMakeLists.txt 所在目录[span_3](end_span)
        run: |
          cmake -S src/main/cpp -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROFILING=OFF

      - name: Build Project
        # [span_4](start_span)编译生成 libmobileglues.so[span_4](end_span)
        run: cmake --build build --config Release

      - name: Collect Artifacts
        # 这里的路径需要根据项目实际生成的 so 位置进行收集
        run: |
          mkdir -p dist/${{ matrix.abi }}
          # [span_5](start_span)查找并拷贝主库[span_5](end_span)
          find build -name "libmobileglues.so" -exec cp {} dist/${{ matrix.abi }}/ \;
          # [span_6](start_span)拷贝依赖的共享库[span_6](end_span)
          # 注意：路径需对应仓库内实际位置，假设在 src/main/cpp/libraries/
          cp src/main/cpp/libraries/${{ matrix.abi }}/libspirv-cross-c-shared.so dist/${{ matrix.abi }}/ || echo "Shared lib not found"

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-${{ matrix.abi }}
          path: dist/
