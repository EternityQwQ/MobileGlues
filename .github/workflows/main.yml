name: Android Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # [span_2](start_span)[span_3](start_span)对应您项目 libraries/ 目录下的架构文件夹名称[span_2](end_span)[span_3](end_span)
        abi: [arm64-v8a, armeabi-v7a]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 如果您的 .a 库文件使用了 Git LFS，请开启此项
          lfs: true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 修复：不再引用外部可能失效的 Action，直接使用 Runner 预装的 NDK
      # GitHub Hosted Runner 默认提供了多个版本的 NDK
      - name: Configure CMake
        run: |
          # [span_4](start_span)使用 $ANDROID_NDK_LATEST_HOME 提供的工具链[span_4](end_span)
          # ANDROID_PLATFORM 设置为 24 以匹配较现代的 Android 特性
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROFILING=OFF

      - name: Build Project
        # [span_5](start_span)执行构建，生成 libmobileglues.so[span_5](end_span)
        run: cmake --build build --config Release

      - name: Collect Artifacts
        # [span_6](start_span)[span_7](start_span)整理产物，包含主库和必须随附的 spirv-cross 动态库[span_6](end_span)[span_7](end_span)
        run: |
          mkdir -p dist/${{ matrix.abi }}
          # 拷贝主产物
          cp build/libmobileglues.so dist/${{ matrix.abi }}/
          # [span_8](start_span)根据您的 CMakeLists，需要拷贝预编译的共享库[span_8](end_span)
          cp libraries/${{ matrix.abi }}/libspirv-cross-c-shared.so dist/${{ matrix.abi }}/

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-${{ matrix.abi }}
          path: dist/
