name: Build

on: workflow_dispatch
env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    # 添加NDK环境设置
    env:
      ANDROID_NDK: ${{ github.workspace }}/android-ndk

    steps:
    - uses: actions/checkout@v4
    
    # 添加NDK安装步骤
    - name: Install Android NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip -d ${{ github.workspace }}
        echo "NDK_PATH=${{ github.workspace }}/android-ndk-r25c" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        cd src/main/cpp
        mkdir -p build
        git clone --depth 1 https://github.com/g-truc/glm.git include/glm
        git clone --depth 1 https://github.com/stbrumme/xxhash.git 3rdparty/xxhash
        cmake -B build \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-29 \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_PATH }}/build/cmake/android.toolchain.cmake \
          -DANDROID_TOOLCHAIN=clang

    - name: Build
      run: cmake --build src/main/cpp/build --config Release --target mobileglues

    # 修复strip命令路径
    - name: Strip
      run: |
        cd src/main/cpp/build/
        ${{ env.NDK_PATH }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip libmobileglues.so

    # 分离上传步骤
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MobileGlues
        path: src/main/cpp/build/libmobileglues.so
