name: Build MobileGlues Android arm64-v8a Library

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build-android-arm64:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code with Submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Android NDK
      uses: android-actions/setup-android@v3
      with:
        android-ndk: 'r27b'
        api-level: 21

    - name: Configure CMake for Android (arm64-v8a)
      run: |
        cd MobileGlues-cpp
        cmake -B build_android \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a \
              -DANDROID_NATIVE_API_LEVEL=21 \
              -DCMAKE_BUILD_TYPE=Release

    - name: Build Android library (arm64-v8a)
      run: |
        cd MobileGlues-cpp
        cmake --build build_android --config Release -j$(nproc)

    - name: Verify Build Output
      run: |
        echo "Looking for .so files..."
        find MobileGlues-cpp/build_android -name "*.so" -type f -exec ls -lh {} \;
        echo "Looking for output directory..."
        ls -la MobileGlues-cpp/build_android/

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mobileglues-android-arm64-v8a
        path: |
          MobileGlues-cpp/build_android/**/*.so
          MobileGlues-cpp/build_android/**/CMakeCache.txt
        retention-days: 14
